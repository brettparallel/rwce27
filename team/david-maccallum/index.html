				let defaultMode = "light";
				let currentTheme = savedTheme || defaultMode;

				if (currentTheme === "auto") {
					let prefersDarkScheme = window.matchMedia("(prefers-color-scheme: dark)").matches;
						document.documentElement.dataset.brxTheme = prefersDarkScheme ? "dark" : "light";
				} else {
					document.documentElement.dataset.brxTheme = currentTheme;
				}
		})();

<script>
document.addEventListener('DOMContentLoaded', function() {
    const sidemenu = document.querySelector('.rwce__sidemenu-card');
    if (!sidemenu) return;
    
    // Get all links, but separate internal from external
    const allLinks = sidemenu.querySelectorAll('.brxe-text-link');
    const internalLinks = []; // Links with data-section (for scroll spy)
    const externalLinks = []; // Links without data-section (PDFs, external)
    const accordionLinks = []; // Links without href (accordion items)
    
    allLinks.forEach(link => {
        const href = link.getAttribute('href');
        
        if (link.hasAttribute('data-section') && href && href.startsWith('#')) {
            internalLinks.push(link);
        } else if (href && (href.startsWith('http') || href.includes('.pdf'))) {
            externalLinks.push(link);
        } else {
            accordionLinks.push(link); // Links without proper href or data-section
        }
    });
    
    console.log(`Found ${internalLinks.length} internal links, ${externalLinks.length} external links, ${accordionLinks.length} accordion items`);
    
    // Only track sections for internal links
    const sections = [];
    internalLinks.forEach(link => {
        const sectionId = link.getAttribute('data-section');
        if (sectionId) {
            // Look for both regular sections and accordion items
            const section = document.getElementById(sectionId);
            if (section) {
                sections.push(section);
            } else {
                // Also check if it's an accordion item inside rwce__accordion
                const accordionItem = document.querySelector(`.rwce__accordion #${sectionId}`);
                if (accordionItem) {
                    sections.push(accordionItem);
                }
            }
        }
    });
    
    let ignoreScroll = false;
    let scrollTimeout;
    
    function updateActiveLink() {
        if (ignoreScroll || sections.length === 0) return;
        
        let currentSection = '';
        const scrollPosition = window.scrollY + 200;
        
        sections.forEach(section => {
            if (!section) return; // Skip if section doesn't exist
            
            const sectionTop = section.offsetTop;
            const sectionBottom = sectionTop + section.offsetHeight;
            
            if (scrollPosition >= sectionTop && scrollPosition < sectionBottom) {
                currentSection = section.getAttribute('id');
            }
        });
        
        // Update internal links
        internalLinks.forEach(link => {
            link.classList.remove('active');
            link.removeAttribute('aria-current');
            
            const dataSection = link.getAttribute('data-section');
            
            if (dataSection === currentSection) {
                link.classList.add('active');
                link.setAttribute('aria-current', 'page');
            }
        });
        
        // External links never get active class
        externalLinks.forEach(link => {
            link.classList.remove('active');
            link.removeAttribute('aria-current');
        });
        
        // Accordion links (without proper href) don't get active class from scroll
        accordionLinks.forEach(link => {
            link.classList.remove('active');
            link.removeAttribute('aria-current');
        });
    }
    
    // Click handlers for internal links (smooth scroll)
    internalLinks.forEach(link => {
        link.addEventListener('click', function(e) {
            e.preventDefault();
            
            ignoreScroll = true;
            
            if (scrollTimeout) {
                clearTimeout(scrollTimeout);
            }
            
            // Remove active from ALL links
            allLinks.forEach(l => {
                l.classList.remove('active');
                l.removeAttribute('aria-current');
            });
            
            // Add active to clicked internal link
            this.classList.add('active');
            this.setAttribute('aria-current', 'page');
            
            // Smooth scroll
            const targetId = this.getAttribute('href').substring(1);
            const targetSection = document.getElementById(targetId) || 
                                 document.querySelector(`.rwce__accordion #${targetId}`);
            
            if (targetSection) {
                targetSection.scrollIntoView({
                    behavior: 'smooth',
                    block: 'start'
                });
            }
            
            scrollTimeout = setTimeout(() => {
                ignoreScroll = false;
                updateActiveLink();
            }, 500);
        });
    });
    
    // External links (PDFs) - let them behave normally
    externalLinks.forEach(link => {
        link.addEventListener('click', function(e) {
            // Don't prevent default - let the PDF open
            allLinks.forEach(l => {
                l.classList.remove('active');
                l.removeAttribute('aria-current');
            });
        });
    });
    
    // Accordion items (no href) - handle them separately
    accordionLinks.forEach(link => {
        link.addEventListener('click', function(e) {
            e.preventDefault(); // Prevent any default behavior
            
            // Remove active from ALL links
            allLinks.forEach(l => {
                l.classList.remove('active');
                l.removeAttribute('aria-current');
            });
            
            // Add active to clicked accordion link
            this.classList.add('active');
            this.setAttribute('aria-current', 'page');
            
            // Find and click the associated accordion title if it exists
            const accordionId = this.id;
            if (accordionId) {
                // Try to find and open associated accordion
                const accordionItem = this.closest('.brxe-block[id]');
                if (accordionItem) {
                    const titleWrapper = accordionItem.querySelector('.accordion-title-wrapper');
                    if (titleWrapper && titleWrapper.getAttribute('aria-expanded') === 'false') {
                        titleWrapper.click(); // Open the accordion
                    }
                }
            }
        });
    });
    
    window.addEventListener('scroll', updateActiveLink);
    
    // Handle initial hash
    if (window.location.hash) {
        const hash = window.location.hash.substring(1);
        const activeLink = document.querySelector(`.rwce__sidemenu-card .brxe-text-link[data-section="${hash}"]`);
        if (activeLink) {
            allLinks.forEach(l => {
                l.classList.remove('active');
                l.removeAttribute('aria-current');
            });
            activeLink.classList.add('active');
            activeLink.setAttribute('aria-current', 'page');
            
            // If it's an accordion item, open it
            if (accordionLinks.includes(activeLink)) {
                const accordionItem = document.getElementById(hash);
                if (accordionItem) {
                    const titleWrapper = accordionItem.querySelector('.accordion-title-wrapper');
                    if (titleWrapper && titleWrapper.getAttribute('aria-expanded') === 'false') {
                        titleWrapper.click();
                    }
                }
            }
        }
    } else {
        updateActiveLink();
    }
});
</script>
